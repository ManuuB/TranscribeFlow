<!DOCTYPE html>
<html>
<head>
    <title>History</title>
</head>
<body>

<h2>All Results</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Filename</th>
        <th>Transcription</th>
        <th>Summary</th>
        <th>Date</th>
    </tr>

    {% for row in records %}
    <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.filename }}</td>
        <td>{{ row.transcription }}</td>
        <td>{{ row.summary }}</td>
        <td>{{ row.created_at }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
