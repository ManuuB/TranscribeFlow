<!DOCTYPE html>
<html>
<head>
    <title>TranscribeFlow Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
    <div class="logo">🎙 TranscribeFlow</div>
    <div class="right">
        <span class="welcome">Welcome, {{ session['user'] }}</span>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>
</div>

<div class="main-wrapper">

    <div class="dashboard-card">

        <h1>AI Audio Transcription & Summary</h1>
        <p class="subtitle">Upload or record audio to generate intelligent text output.</p>

        <!-- Upload Section -->
        <div class="section">
            <h3>📁 Upload Audio</h3>

            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="audio" accept=".mp3,.wav,.m4a,.webm" required>

                <button type="submit" class="btn primary">
                    Transcribe & Summarize
                </button>
            </form>

            <p style="margin-top:10px; font-size:14px; color:gray;">
                Supported formats: MP3, WAV, M4A, WEBM
            </p>
        </div>

        <div class="divider"></div>

        <!-- Live Recording Section -->
        <div class="section">
            <h3>🎤 Live Recording</h3>

            <div class="record-buttons">
                <button type="button" onclick="startRecording()" class="btn success">
                    Start Recording
                </button>

                <button type="button" onclick="stopRecording()" class="btn danger">
                    Stop Recording
                </button>
            </div>

            <p id="status">Not recording</p>

            <form id="liveForm" method="POST" action="/live_upload">
                <input type="hidden" name="audio_data" id="audio_data">
            </form>
        </div>

        <div class="divider"></div>

        <!-- History Button -->
        <a href="/history">
            <button type="button" class="btn primary" style="margin-top:15px;">
                📄 View History
            </button>
        </a>

    </div>

</div>

<script>
let mediaRecorder;
let audioChunks = [];

async function startRecording() {

    audioChunks = [];
    document.getElementById("status").innerText = "🔴 Recording...";

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();

    mediaRecorder.ondataavailable = event => {
        audioChunks.push(event.data);
    };

    // Auto stop after 5 minutes
    setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            stopRecording();
        }
    }, 300000);
}

function stopRecording() {

    if (!mediaRecorder) return;

    mediaRecorder.stop();
    document.getElementById("status").innerText = "⏳ Processing...";

    mediaRecorder.onstop = async () => {

        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);

        reader.onloadend = function () {

            document.getElementById("audio_data").value = reader.result;
            document.getElementById("liveForm").submit();

        };
    };
}
</script>

</body>
</html>
