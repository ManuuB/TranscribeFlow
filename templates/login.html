<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.login-container{
    width: 400px;
    margin: 150px auto;
    background: #eeeeee;
    padding: 40px;
    border-radius: 8px;
    text-align: center;
}

.login-container h2{
    margin-bottom: 30px;
}

input{
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #999;
    border-radius: 4px;
    font-size: 14px;
}

button{
    width: 100%;
    padding: 12px;
    background-color: #4CAF50;
    border: none;
    color: rgb(255, 255, 255);
    font-size: 16px;
    border-radius: 4px;
    cursor: pointer;
}

button:hover{
    background-color: #456ca0;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Login</h2>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
